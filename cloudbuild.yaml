# =============================================================================
# Cloud Build pipeline — fastapi-user-management-api
#
# Steps:
#   1. Build Docker image
#   2. Run pytest (SQLite in-memory, no external deps needed)
#   3. Push image to Artifact Registry
#   4. Deploy to Cloud Run with Cloud SQL PostgreSQL
# =============================================================================

substitutions:
  _REGION: southamerica-west1
  _SERVICE: fastapi-user-management-api
  _AR_REPO: fastapi-user-management-api
  _CLOUDSQL_INSTANCE: fastapi-user-management-497621:southamerica-west1:users-db
  _IMAGE: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}

steps:
  # ── 1. Build ────────────────────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: build
    args:
      - build
      - --tag
      - "${_IMAGE}:${SHORT_SHA}"
      - --tag
      - "${_IMAGE}:latest"
      - --cache-from
      - "${_IMAGE}:latest"
      - .

  # ── 2. Test ─────────────────────────────────────────────────────────────────
  # Uses SQLite in-memory DB (conftest.py override) — no Cloud SQL needed here
  - name: "${_IMAGE}:${SHORT_SHA}"
    id: test
    entrypoint: pytest
    args:
      - tests/
      - -v
      - --tb=short
      - --cov=app
      - --cov-report=term-missing
    env:
      - "DATABASE_URL=sqlite:///:memory:"
    waitFor: [build]

  # ── 3. Push ─────────────────────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: push
    args:
      - push
      - --all-tags
      - "${_IMAGE}"
    waitFor: [test]

  # ── 4. Deploy to Cloud Run ──────────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE}"
      - --image
      - "${_IMAGE}:${SHORT_SHA}"
      - --region
      - "${_REGION}"
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8080"
      - --memory
      - "512Mi"
      - --cpu
      - "1"
      - --min-instances
      - "0"
      - --max-instances
      - "5"
      - --add-cloudsql-instances
      - "${_CLOUDSQL_INSTANCE}"
      - --update-secrets
      - "DATABASE_URL=DATABASE_URL:latest"
    waitFor: [push]

images:
  - "${_IMAGE}:${SHORT_SHA}"
  - "${_IMAGE}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: "1200s"
